name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Node (cfe, validar, bcu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: sudo apt-get update && sudo apt-get install -y libxml2-utils # xmllint para validación XSD
      - run: npm ci
      - run: npm run lint
      - run: npm test

  validar-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: cd ports/validar-python && python -m unittest test_validar -v

  validar-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3' }
      - run: cd ports/validar-php && php tests/validar_test.php

  validar-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: cd ports/validar-go && go vet ./... && go test -v ./...

  validar-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - run: |
          cd ports/validar-java
          javac -d out src/main/java/uy/factible/validar/Validar.java src/test/java/uy/factible/validar/ValidarTest.java
          java -cp out uy.factible.validar.ValidarTest
